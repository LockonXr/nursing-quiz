<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>护理考试题库</title>
<style>
:root {
  --bg: #f5f5f5;
  --card: #fff;
  --text: #333;
  --sub: #666;
  --border: #e0e0e0;
  --primary: #4A90D9;
  --primary-light: #6ba3e0;
  --correct: #27ae60;
  --wrong: #e74c3c;
  --star: #f39c12;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
}
body.dark {
  --bg: #1a1a2e;
  --card: #252540;
  --text: #ddd;
  --sub: #999;
  --border: #333;
  --shadow: 0 2px 8px rgba(0,0,0,0.3);
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.5;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}

/* ===== Header ===== */
header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}
header h1 { font-size: 17px; font-weight: 600; }
header .actions { display:flex; gap:6px; }
header .actions button {
  background: none;
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
}

/* ===== Tabs ===== */
.tabs {
  display: flex;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 48px;
  z-index: 99;
}
.tab {
  flex: 1;
  text-align: center;
  padding: 10px 4px;
  font-size: 14px;
  color: var(--sub);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: .2s;
}
.tab.active { color: var(--primary); border-color: var(--primary); font-weight: 600; }

/* ===== Main ===== */
main { padding: 12px; max-width: 700px; margin: 0 auto; }
.page { display: none; }
.page.active { display: block; }

/* ===== Filters ===== */
.filters {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.filters select {
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  background: var(--card);
  color: var(--text);
  flex: 1;
  min-width: 100px;
}

/* ===== Question Card ===== */
.qcard {
  background: var(--card);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
}
.qcard .meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  flex-wrap: wrap;
  gap: 6px;
}
.qcard .meta .badge {
  font-size: 12px;
  padding: 2px 8px;
  border-radius: 10px;
  background: #e8f0fe;
  color: var(--primary);
}
body.dark .qcard .meta .badge { background: #2a3a5c; }
.qcard .qnum { font-size: 14px; color: var(--sub); }
.qcard .stem {
  font-size: 16px;
  margin-bottom: 14px;
  line-height: 1.6;
  font-weight: 500;
}
.qcard .stem .note {
  color: var(--wrong);
  font-size: 12px;
  font-weight: normal;
}

/* Options */
.options { display: flex; flex-direction: column; gap: 8px; }
.opt {
  display: flex;
  align-items: flex-start;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: .15s;
  font-size: 15px;
  line-height: 1.4;
}
.opt:active { transform: scale(0.98); }
.opt .label {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: #eee;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
  font-size: 14px;
  flex-shrink: 0;
  margin-right: 10px;
  margin-top: 1px;
}
body.dark .opt .label { background: #3a3a5c; }
.opt.selected { border-color: var(--primary); background: #e8f0fe; }
body.dark .opt.selected { background: #2a3a5c; }
.opt.correct { border-color: var(--correct); background: #eafaf1; }
body.dark .opt.correct { background: #1a3a2a; }
.opt.correct .label { background: var(--correct); color: #fff; }
.opt.wrong { border-color: var(--wrong); background: #fdecea; }
body.dark .opt.wrong { background: #3a1a1a; }
.opt.wrong .label { background: var(--wrong); color: #fff; }
.opt.correct-answer { border-color: var(--correct); background: #eafaf1; }
body.dark .opt.correct-answer { background: #1a3a2a; }
.opt.correct-answer .label { background: var(--correct); color: #fff; }

/* True/False big buttons */
.tf-options { display: flex; gap: 12px; }
.tf-btn {
  flex: 1;
  padding: 20px;
  border: 2px solid var(--border);
  border-radius: 14px;
  text-align: center;
  font-size: 28px;
  cursor: pointer;
  transition: .15s;
}
.tf-btn:active { transform: scale(0.96); }
.tf-btn.true.selected,.tf-btn.true.correct { border-color: var(--correct); background: #eafaf1; }
.tf-btn.false.selected,.tf-btn.false.correct { border-color: var(--wrong); background: #fdecea; }
.tf-btn.wrong-answer { opacity: 0.5; }

/* ===== Action bar ===== */
.action-bar {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  justify-content: space-between;
  align-items: center;
}
.btn {
  padding: 10px 18px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  font-weight: 500;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-outline { background: none; border: 1px solid var(--border); color: var(--text); }
.btn-sm { padding: 6px 12px; font-size: 13px; }
.btn-danger { background: var(--wrong); color: #fff; }
.btn:active { opacity: 0.8; }

/* ===== Progress ===== */
.progress-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}
.progress-bar {
  flex: 1;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--primary);
  border-radius: 3px;
  transition: .3s;
}
.progress-text { font-size: 13px; color: var(--sub); white-space: nowrap; }

/* ===== Exam timer ===== */
.timer {
  font-size: 18px;
  font-weight: 600;
  color: var(--primary);
  text-align: center;
  padding: 6px;
}
.timer.warning { color: var(--wrong); animation: pulse 1s infinite; }
@keyframes pulse { 50% { opacity: 0.5; } }

/* ===== Result ===== */
.result { text-align: center; padding: 20px; }
.result .score { font-size: 48px; font-weight: 700; color: var(--primary); }
.result .summary { font-size: 15px; color: var(--sub); margin: 10px 0; }

/* ===== Lists (错题/收藏/统计) ===== */
.item-list { display: flex; flex-direction: column; gap: 8px; }
.list-item {
  background: var(--card);
  border-radius: 10px;
  padding: 12px 14px;
  box-shadow: var(--shadow);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
}
.list-item .li-stem { flex: 1; font-size: 14px; overflow: hidden; text-overflow: ellipsis; }
.list-item .li-actions { display: flex; gap: 6px; flex-shrink: 0; }
.empty { text-align: center; color: var(--sub); padding: 40px 20px; font-size: 15px; }

/* ===== Stats ===== */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.stat-card {
  background: var(--card);
  border-radius: 10px;
  padding: 14px;
  text-align: center;
  box-shadow: var(--shadow);
}
.stat-card .val { font-size: 28px; font-weight: 700; color: var(--primary); }
.stat-card .lbl { font-size: 12px; color: var(--sub); margin-top: 2px; }
.paper-stats { display: flex; flex-direction: column; gap: 8px; }

/* ===== Sheet Modal ===== */
.sheet {
  position: fixed;
  bottom: 0;
  left: 0; right: 0;
  background: var(--card);
  border-radius: 16px 16px 0 0;
  padding: 20px 16px;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
  z-index: 200;
  max-height: 70vh;
  overflow-y: auto;
}
.sheet h3 { margin-bottom: 12px; font-size: 16px; }
.sheet-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.sheet-num {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: #eee;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}
body.dark .sheet-num { background: #3a3a5c; }
.sheet-num.done { background: var(--correct); color: #fff; }
.sheet-num.wrong-q { background: var(--wrong); color: #fff; }
.sheet-num.current { border: 2px solid var(--primary); }
.sheet-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 199;
}

/* ===== Star ===== */
.star-btn {
  background: none; border: none;
  font-size: 22px; cursor: pointer;
  padding: 4px; line-height: 1;
}
.star-btn.active { color: var(--star); }

/* ===== Toast ===== */
.toast {
  position: fixed;
  top: 20px; left: 50%; transform: translateX(-50%);
  background: #333; color: #fff;
  padding: 8px 20px; border-radius: 20px;
  font-size: 14px; z-index: 300;
  animation: fadeInOut 2s;
}
@keyframes fadeInOut {
  0% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
  15% { opacity: 1; transform: translateX(-50%) translateY(0); }
  85% { opacity: 1; }
  100% { opacity: 0; }
}
</style>
</head>
<body>

<header>
  <h1>🏥 护理考试题库</h1>
  <div class="actions">
    <button onclick="toggleDark()" title="夜间模式">🌙</button>
    <button onclick="showReset()" title="重置">🔄</button>
  </div>
</header>

<nav class="tabs">
  <div class="tab active" data-tab="quiz">📝 刷题</div>
  <div class="tab" data-tab="wrong">❌ 错题<span id="wrongCount" style="font-size:11px"></span></div>
  <div class="tab" data-tab="fav">⭐ 收藏</div>
  <div class="tab" data-tab="stats">📊 统计</div>
</nav>

<main>
  <!-- ==================== 刷题页 ==================== -->
  <div class="page active" id="page-quiz">
    <div class="filters">
      <select id="selPaper"><option value="all">全部试卷</option></select>
      <select id="selType">
        <option value="all">全部题型</option>
        <option value="single">单选题</option>
        <option value="multi">多选题</option>
        <option value="truefalse">是非题</option>
        <option value="essay">简答题</option>
      </select>
      <select id="selMode">
        <option value="practice">练习模式</option>
        <option value="exam">考试模式</option>
      </select>
    </div>

    <div id="timerDisplay" class="timer" style="display:none"></div>
    <div id="progressWrap" class="progress-wrap" style="display:none">
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <span class="progress-text" id="progressText">0/0</span>
    </div>

    <div id="questionArea"></div>
    <div id="examResult" style="display:none"></div>

    <div id="quizActions" class="action-bar" style="display:none">
      <button class="btn btn-outline btn-sm" onclick="prevQuestion()">◀ 上一题</button>
      <button class="btn btn-outline btn-sm" id="sheetBtn" onclick="toggleSheet()">📋 题号</button>
      <button class="btn btn-outline btn-sm" onclick="nextQuestion()">下一题 ▶</button>
    </div>
    <div style="text-align:center;margin-top:12px">
      <button class="btn btn-primary" id="startBtn" onclick="startQuiz()">开始刷题</button>
    </div>
  </div>

  <!-- ==================== 错题页 ==================== -->
  <div class="page" id="page-wrong">
    <div id="wrongList" class="item-list"></div>
    <div class="action-bar" id="wrongActions" style="display:none">
      <button class="btn btn-outline" onclick="retryWrong()">🔁 重做错题</button>
      <button class="btn btn-danger btn-sm" onclick="clearWrong()">🗑 清空错题集</button>
    </div>
  </div>

  <!-- ==================== 收藏页 ==================== -->
  <div class="page" id="page-fav">
    <div id="favList" class="item-list"></div>
    <div class="action-bar" id="favActions" style="display:none">
      <button class="btn btn-outline" onclick="retryFav()">🔁 做收藏题</button>
      <button class="btn btn-danger btn-sm" onclick="clearFav()">🗑 清空收藏</button>
    </div>
  </div>

  <!-- ==================== 统计页 ==================== -->
  <div class="page" id="page-stats">
    <div class="stat-grid">
      <div class="stat-card"><div class="val" id="statTotal">0</div><div class="lbl">总做题数</div></div>
      <div class="stat-card"><div class="val" id="statRate">--</div><div class="lbl">正确率</div></div>
      <div class="stat-card"><div class="val" id="statWrong">0</div><div class="lbl">错题数</div></div>
      <div class="stat-card"><div class="val" id="statFav">0</div><div class="lbl">收藏数</div></div>
    </div>
    <h3 style="margin-bottom:8px;font-size:15px">📋 各试卷统计</h3>
    <div id="paperStats" class="paper-stats"></div>
  </div>
</main>

<script>
// ==================== GLOBAL STATE ====================
let questions = [];
let filteredQs = [];
let currentIdx = 0;
let mode = 'practice'; // 'practice' | 'exam'
let examAnswers = {}; // {idx: userAnswer} - set after submission
let multiPending = {};  // {idx: str} - pending multi-select selections
let examStartTime = 0;
let examTimer = null;

// Persistent data
function LS(key, def) {
  try { const v = localStorage.getItem('quiz_'+key); return v ? JSON.parse(v) : def; }
  catch(e) { return def; }
}
function LSSet(key, val) { localStorage.setItem('quiz_'+key, JSON.stringify(val)); }

let wrongSet = LS('wrong', {});    // {qid: true}
let favSet = LS('fav', {});        // {qid: true}
let history = LS('history', {});   // {qid: {correct:bool, userAnswer:str, ts:num}}
let examRecords = LS('exams', []); // [{paper, score, total, time, date}]

// ==================== INIT ====================
async function init() {
  try {
    const res = await fetch('questions.json');
    const data = await res.json();
    // Flatten all questions
    for (const ep of data) {
      for (const sec of ep.sections) {
        for (const q of sec.questions) {
          q._paper = ep.paper;
          q._section = sec.section;
          questions.push(q);
        }
      }
    }

    // Populate filter dropdowns
    const papers = [...new Set(questions.map(q => q._paper))];
    const sel = document.getElementById('selPaper');
    papers.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p; opt.textContent = p;
      sel.appendChild(opt);
    });

    // Restore dark mode
    if (LS('dark', false)) { document.body.classList.add('dark'); }

    // Tab switching
    document.querySelectorAll('.tab').forEach(t => {
      t.addEventListener('click', () => switchTab(t.dataset.tab));
    });

    // 筛选项变化时重置界面
    ['selPaper', 'selType', 'selMode'].forEach(id => {
      document.getElementById(id).addEventListener('change', resetQuizUI);
    });

    updateBadges();
    console.log(`Loaded ${questions.length} questions from ${papers.length} papers`);
  } catch(e) {
    document.getElementById('questionArea').innerHTML =
      '<div class="empty">⚠️ 加载题库失败，请确保 questions.json 在同一目录下<br><small>'+e.message+'</small></div>';
  }
}

// ==================== TAB SWITCHING ====================
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
  document.getElementById('page-'+tab).classList.add('active');

  if (tab === 'wrong') renderWrong();
  if (tab === 'fav') renderFav();
  if (tab === 'stats') renderStats();
  if (tab === 'quiz' && filteredQs.length > 0) {
    // 回到刷题页，显示当前进度
    document.getElementById('quizActions').style.display = 'flex';
    document.getElementById('progressWrap').style.display = 'flex';
    document.getElementById('startBtn').style.display = 'none';
    if (mode === 'exam') document.getElementById('timerDisplay').style.display = 'block';
  }
}

// ==================== QUIZ ====================
function startQuiz() {
  const paper = document.getElementById('selPaper').value;
  const type = document.getElementById('selType').value;
  mode = document.getElementById('selMode').value;

  filteredQs = questions.filter(q => {
    if (paper !== 'all' && q._paper !== paper) return false;
    if (type !== 'all' && q.type !== type) return false;
    return true;
  });

  if (!filteredQs.length) {
    alert('没有匹配的题目');
    return;
  }

  // Exam mode: shuffle
  if (mode === 'exam') {
    filteredQs = shuffle([...filteredQs]);
    examAnswers = {};
    examStartTime = Date.now();
    startTimer();
    document.getElementById('examResult').style.display = 'none';
  } else {
    stopTimer();
  }

  currentIdx = 0;
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('quizActions').style.display = 'flex';
  document.getElementById('progressWrap').style.display = 'flex';
  document.getElementById('questionArea').style.display = 'block';
  document.getElementById('timerDisplay').style.display = mode === 'exam' ? 'block' : 'none';

  renderQuestion();
  updateProgress();
}

function renderQuestion() {
  if (!filteredQs.length || currentIdx >= filteredQs.length) {
    if (mode === 'exam') finishExam();
    return;
  }

  const q = filteredQs[currentIdx];
  const area = document.getElementById('questionArea');
  const isMulti = q.type === 'multi';
  const isTF = q.type === 'truefalse';
  const isEssay = q.type === 'essay';
  const answered = examAnswers[currentIdx] !== undefined;
  const correctAns = q.answer || '';

  let html = `<div class="qcard" id="qcard">`;
  html += `<div class="meta">`;
  html += `<span class="badge">${q._paper}</span>`;
  html += `<span class="badge">${q._section}</span>`;
  if (q.note) html += `<span class="note" style="font-size:12px;color:#e74c3c">[${q.note}]</span>`;
  html += `<span class="qnum">${currentIdx+1}/${filteredQs.length}</span>`;
  html += `</div>`;

  html += `<div class="stem">${q.stem}${q.note ? '' : ''}</div>`;

  // 多选题：只有提交后才显示对错（examAnswers有值）
  // 单/判断题：点击即提交（examAnswers有值）
  const showFeedback = answered; // 单/判：点选即反馈；多选：确认后 examAnswers 才有值

  if (isTF) {
    html += `<div class="tf-options">`;
    html += `<div class="tf-btn true ${showFeedback && examAnswers[currentIdx]==='正确'?'selected':''}" data-ans="正确">✓ 正确</div>`;
    html += `<div class="tf-btn false ${showFeedback && examAnswers[currentIdx]==='错误'?'selected':''}" data-ans="错误">✗ 错误</div>`;
    html += `</div>`;
  } else if (isEssay) {
    html += `<div class="opt" style="background:#fff9e6;border-color:#f0d060;display:block">`;
    html += `<strong>📝 简答题参考答案：</strong><br>`;
    html += `<em style="color:var(--sub)">（本题为简答题，请在纸上作答后对照教材）</em>`;
    html += `</div>`;
  } else if (q.options && Object.keys(q.options).length > 0) {
    html += `<div class="options">`;
    for (const [label, text] of Object.entries(q.options)) {
      let cls = 'opt';
      // 多选题：高亮待选中的选项（练习模式用 multiPending，考试模式用 examAnswers）
      if (isMulti && !showFeedback) {
        const pending = mode === 'exam' ? examAnswers[currentIdx] : multiPending[currentIdx];
        if (pending && pending.includes(label)) cls += ' selected';
      }
      if (showFeedback) {
        const userAns = examAnswers[currentIdx] || '';
        const picked = isMulti ? userAns.includes(label) : userAns === label;
        if (picked && correctAns.includes(label)) cls += ' correct';
        else if (picked && !correctAns.includes(label)) cls += ' wrong';
        else if (!picked && correctAns.includes(label)) cls += ' correct-answer';
        if (picked) cls += ' selected';
      }
      html += `<div class="${cls}" data-label="${label}">`;
      html += `<span class="label">${label}</span>`;
      html += `<span>${text}</span>`;
      html += `</div>`;
    }
    html += `</div>`;
  } else {
    html += `<div class="opt" style="opacity:0.6">暂无选项</div>`;
  }

  // 练习模式下作答后显示正确答案
  if (mode === 'practice' && showFeedback) {
    html += `<div style="margin-top:10px;font-size:14px;color:var(--correct)">✅ 正确答案: ${correctAns}</div>`;
  }

  // Show correct answer in exam mode only after exam is done
  html += `</div>`;

  // Star button
  html += `<div style="text-align:right;margin-top:-8px;margin-bottom:8px">`;
  html += `<button class="star-btn ${favSet[q.id]?'active':''}" onclick="toggleFav('${q.id}');this.classList.toggle('active')" title="收藏">★</button>`;
  html += `</div>`;

  area.innerHTML = html;

  // Bind click events
  if (isTF) {
    area.querySelectorAll('.tf-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (mode === 'exam' && examAnswers[currentIdx] !== undefined) return; // no change in exam
        const ans = btn.dataset.ans;
        examAnswers[currentIdx] = ans;
        if (mode === 'practice') {
          checkAnswer(q, ans);
        }
        renderQuestion();
        updateProgress();
        if (mode === 'practice') saveHistory(q, ans);
      });
    });
  } else if (!isEssay) {
    area.querySelectorAll('.opt').forEach(opt => {
      opt.addEventListener('click', () => {
        const label = opt.dataset.label;
        if (!label) return;

        if (isMulti) {
          // 多选题：练习模式暂存到 multiPending，考试模式存到 examAnswers
          if (mode === 'exam') {
            let cur = examAnswers[currentIdx] || '';
            if (cur.includes(label)) cur = cur.replace(label, '');
            else cur += label;
            examAnswers[currentIdx] = cur.split('').sort().join('');
          } else {
            let cur = multiPending[currentIdx] || '';
            if (cur.includes(label)) cur = cur.replace(label, '');
            else cur += label;
            multiPending[currentIdx] = cur.split('').sort().join('');
          }
          renderQuestion();
        } else {
          // Single select
          if (mode === 'exam' && examAnswers[currentIdx] !== undefined) return;
          examAnswers[currentIdx] = label;
          if (mode === 'practice') {
            checkAnswer(q, label);
            saveHistory(q, label);
          }
          renderQuestion();
          updateProgress();
        }
      });
    });
  }

  // 多选题：作答后显示结果
  if (isMulti && mode === 'practice' && showFeedback) {
    const userAns = examAnswers[currentIdx] || '';
    const correct = userAns === correctAns;
    if (!document.getElementById('multiResult')) {
      const res = document.createElement('div');
      res.id = 'multiResult';
      res.style.cssText = `margin-top:10px;font-size:14px;color:${correct?'var(--correct)':'var(--wrong)'}`;
      res.textContent = correct ? '✅ 回答正确！' : `❌ 回答错误！正确答案: ${correctAns}`;
      document.getElementById('qcard').appendChild(res);
    }
  }

  // 多选题：未提交时显示确认按钮
  if (isMulti && mode === 'practice' && !showFeedback && (multiPending[currentIdx]||'').length > 0) {
    const submitDiv = document.createElement('div');
    submitDiv.style.cssText = 'text-align:center;margin-top:8px;';
    submitDiv.innerHTML = '<button class="btn btn-primary btn-sm" id="multiSubmit">确认答案</button>';
    document.getElementById('qcard').appendChild(submitDiv);
    document.getElementById('multiSubmit').addEventListener('click', () => {
      const q = filteredQs[currentIdx];
      const userAns = multiPending[currentIdx] || '';
      examAnswers[currentIdx] = userAns; // 提交！
      const correct = userAns === (q.answer || '');
      if (!correct) { wrongSet[q.id] = true; } else { delete wrongSet[q.id]; }
      LSSet('wrong', wrongSet);
      saveHistory(q, userAns);
      updateBadges();
      renderQuestion();
      updateProgress();
    });
  }
}

function checkAnswer(q, userAns) {
  const correct = q.answer || '';
  const isCorrect = userAns === correct || (q.type === 'multi' && userAns.split('').sort().join('') === correct.split('').sort().join(''));
  if (isCorrect) {
    delete wrongSet[q.id];
  } else {
    wrongSet[q.id] = true;
  }
  LSSet('wrong', wrongSet);
  updateBadges();
}

function saveHistory(q, userAns) {
  const correct = (q.answer || '') === userAns;
  history[q.id] = { correct, userAnswer: userAns, ts: Date.now() };
  LSSet('history', history);
}

// ==================== NAVIGATION ====================
function prevQuestion() { if (currentIdx > 0) { currentIdx--; renderQuestion(); updateProgress(); } }
function nextQuestion() {
  if (currentIdx < filteredQs.length - 1) {
    currentIdx++;
    renderQuestion();
    updateProgress();
  } else if (mode === 'exam') {
    if (confirm('这是最后一题，确定交卷吗？')) finishExam();
  }
}

function updateProgress() {
  const total = filteredQs.length;
  let answered = 0;
  for (let i = 0; i < total; i++) {
    if (examAnswers[i] !== undefined || (multiPending[i] && multiPending[i].length > 0)) answered++;
  }
  document.getElementById('progressFill').style.width = (answered/total*100)+'%';
  document.getElementById('progressText').textContent = `${answered}/${total}`;
}

// ==================== SHEET (题号面板) ====================
function toggleSheet() {
  const existing = document.getElementById('sheetPanel');
  if (existing) { existing.remove(); document.getElementById('sheetBackdrop').remove(); return; }

  const backdrop = document.createElement('div');
  backdrop.className = 'sheet-backdrop';
  backdrop.id = 'sheetBackdrop';
  backdrop.onclick = toggleSheet;

  const sheet = document.createElement('div');
  sheet.className = 'sheet';
  sheet.id = 'sheetPanel';
  sheet.innerHTML = '<h3>答题卡</h3><div class="sheet-grid"></div>';
  const grid = sheet.querySelector('.sheet-grid');

  filteredQs.forEach((q, i) => {
    const num = document.createElement('div');
    num.className = 'sheet-num';
    num.textContent = i + 1;
    if (i === currentIdx) num.classList.add('current');
    const hasAnswer = examAnswers[i] !== undefined || (multiPending[i] && multiPending[i].length > 0);
    if (hasAnswer) {
      if (mode === 'practice') {
        const ans = examAnswers[i] || multiPending[i] || '';
        const correct = ans === q.answer;
        num.classList.add(correct ? 'done' : 'wrong-q');
      } else {
        num.classList.add('done');
      }
    }
    num.onclick = () => { currentIdx = i; renderQuestion(); updateProgress(); toggleSheet(); };
    grid.appendChild(num);
  });

  document.body.appendChild(backdrop);
  document.body.appendChild(sheet);
}

// ==================== EXAM MODE ====================
function startTimer() {
  stopTimer();
  document.getElementById('timerDisplay').textContent = '⏱ 00:00';
  document.getElementById('timerDisplay').classList.remove('warning');
  examTimer = setInterval(() => {
    const elapsed = Math.floor((Date.now() - examStartTime) / 1000);
    const min = Math.floor(elapsed / 60).toString().padStart(2, '0');
    const sec = (elapsed % 60).toString().padStart(2, '0');
    document.getElementById('timerDisplay').textContent = `⏱ ${min}:${sec}`;
    if (elapsed > 1800) document.getElementById('timerDisplay').classList.add('warning');
  }, 1000);
}

function stopTimer() {
  if (examTimer) { clearInterval(examTimer); examTimer = null; }
  document.getElementById('timerDisplay').style.display = 'none';
}

function finishExam() {
  stopTimer();
  const total = filteredQs.length;
  let correct = 0;
  let wrong = 0;
  filteredQs.forEach((q, i) => {
    // 合并 multiPending 到 examAnswers（考试模式下已直接存 examAnswers）
    const ua = examAnswers[i] || '';
    if (!ua && q.type === 'multi' && multiPending[i]) {
      examAnswers[i] = multiPending[i];
    }
    const finalAns = examAnswers[i] || '';
    const sortedAns = (finalAns || '').split('').sort().join('');
    const sortedCorrect = (q.answer || '').split('').sort().join('');
    if (finalAns && (sortedAns === sortedCorrect)) {
      correct++;
      delete wrongSet[q.id];
    } else if (finalAns) {
      wrong++;
      wrongSet[q.id] = true;
    }
  });
  LSSet('wrong', wrongSet);

  // Save to history
  filteredQs.forEach((q, i) => {
    const ua = examAnswers[i] || '';
    if (ua) {
      history[q.id] = {
        correct: (ua.split('').sort().join('') === (q.answer||'').split('').sort().join('')),
        userAnswer: ua,
        ts: Date.now()
      };
    }
  });
  LSSet('history', history);

  const elapsed = Math.floor((Date.now() - examStartTime) / 1000);
  const min = Math.floor(elapsed / 60);
  const sec = elapsed % 60;

  examRecords.push({
    paper: document.getElementById('selPaper').value,
    score: correct, total,
    time: elapsed,
    date: new Date().toISOString()
  });
  LSSet('exams', examRecords.slice(-50)); // keep last 50

  const area = document.getElementById('questionArea');
  area.style.display = 'none';
  document.getElementById('quizActions').style.display = 'none';
  document.getElementById('progressWrap').style.display = 'none';

  const res = document.getElementById('examResult');
  res.style.display = 'block';
  res.innerHTML = `
    <div class="result">
      <div class="score">${correct}/${total}</div>
      <div class="summary">
        正确率: ${(correct/total*100).toFixed(0)}% | 用时: ${min}分${sec}秒
      </div>
      <button class="btn btn-primary" onclick="reviewExam()">📋 查看答案解析</button>
      <button class="btn btn-outline" onclick="resetQuiz()" style="margin-left:8px">🔄 返回</button>
    </div>
  `;

  updateBadges();
}

function reviewExam() {
  mode = 'practice'; // switch to review mode
  document.getElementById('examResult').style.display = 'none';
  document.getElementById('questionArea').style.display = 'block';
  document.getElementById('quizActions').style.display = 'flex';
  document.getElementById('progressWrap').style.display = 'flex';
  currentIdx = 0;
  renderQuestion();
  updateProgress();
}

function resetQuizUI() {
  stopTimer();
  document.getElementById('questionArea').style.display = 'block';
  document.getElementById('questionArea').innerHTML = '';
  document.getElementById('examResult').style.display = 'none';
  document.getElementById('quizActions').style.display = 'none';
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('timerDisplay').style.display = 'none';
  document.getElementById('startBtn').style.display = '';
  examAnswers = {};
  multiPending = {};
  filteredQs = [];
  currentIdx = 0;
}

function resetQuiz() {
  resetQuizUI();
}

// ==================== FAVORITES ====================
function toggleFav(qid) {
  if (favSet[qid]) delete favSet[qid];
  else favSet[qid] = true;
  LSSet('fav', favSet);
  updateBadges();
}

function renderFav() {
  const favQs = questions.filter(q => favSet[q.id]);
  const container = document.getElementById('favList');
  const actions = document.getElementById('favActions');

  if (!favQs.length) {
    container.innerHTML = '<div class="empty">⭐ 还没有收藏题目<br><small>刷题时点击 ★ 即可收藏</small></div>';
    actions.style.display = 'none';
    return;
  }
  actions.style.display = 'flex';
  container.innerHTML = favQs.map(q => `
    <div class="list-item">
      <div class="li-stem">${q.stem.substring(0, 80)}...</div>
      <div class="li-actions">
        <button class="btn btn-sm btn-outline" onclick="removeFav('${q.id}')">取消</button>
      </div>
    </div>
  `).join('');
  updateBadges();
}

function removeFav(qid) { delete favSet[qid]; LSSet('fav', favSet); renderFav(); updateBadges(); }
function clearFav() {
  if (confirm('确定清空所有收藏吗？')) { favSet = {}; LSSet('fav', favSet); renderFav(); updateBadges(); }
}

function retryFav() {
  const favQs = questions.filter(q => favSet[q.id]);
  if (!favQs.length) return;
  filteredQs = [...favQs];
  mode = 'practice';
  examAnswers = {};
  currentIdx = 0;
  stopTimer();
  switchTab('quiz');
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('quizActions').style.display = 'flex';
  document.getElementById('progressWrap').style.display = 'flex';
  renderQuestion();
  updateProgress();
}

// ==================== WRONG ANSWERS ====================
function renderWrong() {
  const wrongQs = questions.filter(q => wrongSet[q.id]);
  const container = document.getElementById('wrongList');
  const actions = document.getElementById('wrongActions');

  if (!wrongQs.length) {
    container.innerHTML = '<div class="empty">🎉 没有错题，继续保持！</div>';
    actions.style.display = 'none';
    return;
  }
  actions.style.display = 'flex';

  // Group by paper
  const grouped = {};
  wrongQs.forEach(q => {
    if (!grouped[q._paper]) grouped[q._paper] = [];
    grouped[q._paper].push(q);
  });

  container.innerHTML = Object.entries(grouped).map(([paper, qs]) => `
    <div style="font-size:13px;color:var(--sub);margin-top:8px;font-weight:600">${paper} (${qs.length}题)</div>
    ${qs.map(q => `
      <div class="list-item">
        <div class="li-stem">${q.stem.substring(0, 80)}...</div>
        <div class="li-actions">
          <span style="font-size:12px;color:var(--wrong)">答案:${q.answer||'?'}</span>
          <button class="btn btn-sm btn-outline" onclick="removeWrong('${q.id}')">移除</button>
        </div>
      </div>
    `).join('')}
  `).join('');
  document.getElementById('wrongCount').textContent = `(${wrongQs.length})`;
  updateBadges();
}

function removeWrong(qid) { delete wrongSet[qid]; LSSet('wrong', wrongSet); renderWrong(); updateBadges(); }
function clearWrong() {
  if (confirm('确定清空所有错题吗？此操作不可撤销！')) {
    wrongSet = {}; LSSet('wrong', wrongSet); renderWrong(); updateBadges();
  }
}

function retryWrong() {
  const wrongQs = questions.filter(q => wrongSet[q.id]);
  if (!wrongQs.length) return;
  filteredQs = shuffle([...wrongQs]);
  mode = 'practice';
  examAnswers = {};
  currentIdx = 0;
  stopTimer();
  switchTab('quiz');
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('quizActions').style.display = 'flex';
  document.getElementById('progressWrap').style.display = 'flex';
  renderQuestion();
  updateProgress();
}

// ==================== STATS ====================
function renderStats() {
  const totalAnswered = Object.keys(history).length;
  const correctCount = Object.values(history).filter(h => h.correct).length;
  const rate = totalAnswered ? (correctCount / totalAnswered * 100).toFixed(1) + '%' : '--';

  document.getElementById('statTotal').textContent = totalAnswered;
  document.getElementById('statRate').textContent = rate;
  document.getElementById('statWrong').textContent = Object.keys(wrongSet).length;
  document.getElementById('statFav').textContent = Object.keys(favSet).length;

  // Per-paper stats
  const paperStats = {};
  questions.forEach(q => {
    if (!paperStats[q._paper]) paperStats[q._paper] = { total: 0, correct: 0 };
    paperStats[q._paper].total++;
    if (history[q.id] && history[q.id].correct) paperStats[q._paper].correct++;
  });

  const psDiv = document.getElementById('paperStats');
  psDiv.innerHTML = Object.entries(paperStats).map(([paper, s]) => {
    const pct = s.total ? (s.correct / s.total * 100).toFixed(1) : '0';
    const answered = questions.filter(q => q._paper === paper && history[q.id]).length;
    return `
      <div class="list-item">
        <div style="flex:1">
          <div style="font-weight:500">${paper}</div>
          <div style="font-size:12px;color:var(--sub)">题库${s.total}题 | 已做${answered}题 | 正确${s.correct}题</div>
        </div>
        <div style="font-size:22px;font-weight:700;color:${parseFloat(pct)>=60?'var(--correct)':'var(--wrong)'}">${pct}%</div>
      </div>
    `;
  }).join('');

  // Recent exams
  if (examRecords.length) {
    psDiv.innerHTML += `<h3 style="margin:12px 0 8px;font-size:15px">📝 最近考试记录</h3>`;
    psDiv.innerHTML += examRecords.slice(-5).reverse().map(e => {
      const d = new Date(e.date);
      return `<div class="list-item">
        <div style="flex:1">
          <div style="font-weight:500">${e.paper||'全部'}</div>
          <div style="font-size:12px;color:var(--sub)">${d.toLocaleDateString()} ${d.toLocaleTimeString()}</div>
        </div>
        <div style="text-align:right">
          <div style="font-weight:600">${e.score}/${e.total}</div>
          <div style="font-size:12px;color:var(--sub)">${Math.floor(e.time/60)}分${e.time%60}秒</div>
        </div>
      </div>`;
    }).join('');
  }
}

// ==================== RESET ====================
function showReset() {
  const opts = [
    '取消',
    '重置当前试卷进度',
    '清空错题集',
    '清空收藏夹',
    '清除全部数据（错题+收藏+记录）',
  ];
  const choice = prompt(
    '🔄 重置选项：\n\n' +
    '1 - 重置当前试卷进度\n' +
    '2 - 清空错题集\n' +
    '3 - 清空收藏夹\n' +
    '4 - 清除全部数据\n\n' +
    '请输入数字 (1-4)：'
  );
  if (!choice) return;

  switch(choice.trim()) {
    case '1':
      const paper = document.getElementById('selPaper').value;
      if (paper === 'all') {
        Object.keys(history).forEach(k => delete history[k]);
      } else {
        questions.filter(q => q._paper === paper).forEach(q => delete history[q.id]);
      }
      LSSet('history', history);
      alert('已重置该试卷进度');
      break;
    case '2':
      wrongSet = {};
      LSSet('wrong', wrongSet);
      alert('错题集已清空');
      break;
    case '3':
      favSet = {};
      LSSet('fav', favSet);
      alert('收藏夹已清空');
      break;
    case '4':
      if (confirm('确定清除全部数据？此操作不可撤销！')) {
        wrongSet = {};
        favSet = {};
        history = {};
        examRecords = [];
        LSSet('wrong', wrongSet);
        LSSet('fav', favSet);
        LSSet('history', history);
        LSSet('exams', examRecords);
        alert('全部数据已清除');
      }
      break;
  }
  updateBadges();
  if (document.getElementById('page-stats').classList.contains('active')) renderStats();
  if (document.getElementById('page-wrong').classList.contains('active')) renderWrong();
  if (document.getElementById('page-fav').classList.contains('active')) renderFav();
}

// ==================== DARK MODE ====================
function toggleDark() {
  document.body.classList.toggle('dark');
  LSSet('dark', document.body.classList.contains('dark'));
}

// ==================== UTILS ====================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function updateBadges() {
  const wc = Object.keys(wrongSet).length;
  document.getElementById('wrongCount').textContent = wc ? ` (${wc})` : '';
}

// ==================== BOOT ====================
init();
</script>
